app = 'islami-jindegi'
primary_region = 'bom'

[build]
  [build.args]
    NEXT_PUBLIC_API_URL = 'https://islami-jindegi-dotnet-api.fly.dev'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
